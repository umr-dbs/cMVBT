[package]
name = "MV-BPlusTree"
version = "0.0.62"
edition = "2021"
authors = ["Amir El-Shaikh <elshaikh@mathematik.uni-marburg.de>"]
description = "MV-B+Tree Implementation"
repository = "https://github.com/umr-dbs/MV-BPlusTree"

[profile.dev]
overflow-checks = false

[profile.release]
overflow-checks = false

[features]
hardware-lock-elision = []

[lib]
name = "mv_b_tree"
path = "src/lib.rs"
crate-type = ["cdylib"]
# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
CCBPlusTree = { git = "ssh://git@github.com/umr-dbs/CC-BPlusTree.git", version = "0.0.119" }
crossbeam-channel = "0.5.14"
threadpool = "1.8.1"
chrono = "0.4.39"
rand = "0.8.5"
itertools = "0.14.0"
parking_lot = { version = "0.12.3", features = ["hardware-lock-elision"] }
serde_json = "1.0.137"
serde = "1.0.217"
[target.'cfg(target_os = "linux")'.dependencies]
libc = "0.2.169"