[package]
name = "MV-BPlusTree"
version = "0.0.77"
edition = "2021"
authors = ["Amir El-Shaikh <elshaikh@mathematik.uni-marburg.de>"]
description = "MV-B+Tree Implementation"
repository = "https://github.com/umr-dbs/MV-BPlusTree"

[profile.dev]
overflow-checks = false

[profile.release]
overflow-checks = false
#debug = true
#panic = "unwind"

[build]
rustflags = ["-C", "target-cpu=native"]

[features]
hardware-lock-elision = []

[lib]
name = "mv_b_tree"
path = "src/lib.rs"
crate-type = ["cdylib"]
# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
CCBPlusTree = { git = "ssh://git@github.com/umr-dbs/CC-BPlusTree.git", version = "0.0.120" }
crossbeam-channel = "0.5.15"
threadpool = "1.8.1"
chrono = "0.4.41"
rand_distr = "0.5.1"
rand = "0.9.1"
itertools = "0.14.0"
parking_lot = { version = "0.12.4", features = ["hardware-lock-elision"] }
serde_json = "1.0.140"
serde = "1.0.219"
[target.'cfg(target_os = "linux")'.dependencies]
libc = "0.2.172"