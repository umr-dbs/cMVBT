[package]
name = "MV-BPlusTree"
version = "0.0.52"
edition = "2021"
authors = ["Amir El-Shaikh <elshaikh@mathematik.uni-marburg.de>"]
description = "MV-B+Tree Implementation"
repository = "https://github.com/umr-dbs/MV-BPlusTree"

[profile.dev]
overflow-checks = false

[profile.release]
overflow-checks = false

[features]
hardware-lock-elision = []

[lib]
name = "mv_b_tree"
path = "src/lib.rs"
crate-type = ["cdylib"]
# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
#CCBPlusTree = { path = "../../CLionProjects/CC-BPlusTree" }
CCBPlusTree = { git = "ssh://git@github.com/umr-dbs/CC-BPlusTree.git", version = "0.0.119" }
#crossbeam-utils = "0.8.20"
crossbeam-channel = "0.5.13"
threadpool = "1.8.1"
num_cpus = "1.16.0"
chrono = "0.4.38"
rand = "0.8.5"
itertools = "0.13.0"
parking_lot = { version = "0.12.3", features = ["hardware-lock-elision"] }
serde_json = "1.0.132"
serde = "1.0.215"
[target.'cfg(target_os = "linux")'.dependencies]
libc = "0.2.162"